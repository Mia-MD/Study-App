<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study App</title>
    <link rel="stylesheet" href="../public/styles/todo.css" />
  </head>
  <body>
    <div>
      <button class="quit-btn" id="quit-btn">X</button>
      <a href="../index.html" class="quit-btn back-btn" id="back-btn"><<</a>
      <h1>To Do</h1>
    </div>

    <div id="todo-list" class="todo-container">
      <button class="menu-btn new-task-btn" onclick="displayNewTask()">
        + New task
      </button>
      <div id="new-task" class="menu-btn task hidden">
        <div>
          <input id="new-task-text" type="text" placeholder="New task" />
          <hr />
        </div>
        <button id="add-new-task" onclick="createTask()">+</button>
      </div>
    </div>

    <script src="../scripts/script.js"></script>
    <script src="../scripts/todo.js"></script>
  </body>
</html>
